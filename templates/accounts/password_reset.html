{% extends 'base.html' %}
{% block title %}Atjaunot paroli{% endblock %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card p-4" style="border-radius:14px">
    <h4 class="fw-800 mb-1" style="font-weight:800">Aizmirsāt paroli?</h4>
    <p class="text-muted mb-4" style="font-size:.88rem">Ievadiet savu e-pastu — nosūtīsim saiti paroles atjaunošanai.</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-600" style="font-weight:600">E-pasta adrese</label>
            <input type="email" name="email" class="form-control" placeholder="jusu@epasts.lv" required autofocus>
        </div>
        <button type="submit" class="btn btn-danger w-100 fw-700" style="font-weight:700">
            <i class="bi bi-envelope me-2"></i>Nosūtīt atjaunošanas saiti
        </button>
    </form>
    <div class="text-center mt-3" style="font-size:.85rem">
        <a href="{% url 'login' %}" class="text-muted text-decoration-none">← Atpakaļ uz pieteikšanos</a>
    </div>
</div>
</div>
</div>
{% endblock %}

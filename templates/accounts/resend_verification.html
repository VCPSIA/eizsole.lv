{% extends 'base.html' %}
{% block title %}Verifikācijas saite novecojusi{% endblock %}

{% block content %}
<style>
.verify-card { max-width: 440px; margin: 3rem auto; background: white; border-radius: 16px; border: 1px solid #e9ecef; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.08); text-align: center; padding: 2.5rem 2rem; }
</style>

<div class="verify-card">
    <i class="bi bi-exclamation-triangle text-warning" style="font-size:3rem"></i>
    <h4 class="fw-800 mt-3 mb-2" style="font-weight:800">Saite novecojusi</h4>
    <p class="text-muted mb-4">Verifikācijas saite vairs nav derīga. Varam nosūtīt jaunu.</p>
    <form method="post" action="{% url 'resend_verification' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger w-100 fw-700" style="font-weight:700">
            <i class="bi bi-send me-2"></i>Nosūtīt jaunu saiti
        </button>
    </form>
    <a href="{% url 'home' %}" class="d-block mt-3 text-muted" style="font-size:.85rem">Atgriezties sākumlapā</a>
</div>
{% endblock %}
